<!DOCTYPE html>
<html lang="en">
<head>
    <title>JavaScript Array Sort</title>
</head>
<body>
    <h1>JavaScript Array Sort</h1>
<p>Click button to sort array in acsending or descending order.</p>
<button onclick="ascending()">Ascending Order</button>
<button onclick="descending()">Descending Order</button>
<p id="result"></p>

<script>
    var points = [40, 100, 1, 5, 25, 10];
    document.getElementById("result").innerHTML = points;
    function ascending() {
        points.sort(function(a,b) {
            return a - b;
        });
        document.getElementById("result").innerHTML = points;
    }

    function descending() {
        points.sort(function(a,b) {
            return b - a;
        });
        document.getElementById("result").innerHTML = points;
    }
</script>
</body>
</html>
